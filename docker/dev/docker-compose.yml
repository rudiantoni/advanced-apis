services:
  postgres_18:
    container_name: adv-postgres-18
    image: postgres:18
    restart: unless-stopped
    logging:
      options:
        max-file: "5"
        max-size: "20m"
    healthcheck:
      test: ["CMD-SHELL", "psql --echo-all --username $$POSTGRES_USER --dbname $$POSTGRES_DB --command=\"SELECT VERSION();\""]
      interval: 10s
      retries: 15
      start_period: 5s
      timeout: 20s
    environment:
      - "POSTGRES_DB=adv_pg_db"
      - "POSTGRES_USER=adv_pg_user"
      - "POSTGRES_PASSWORD=adv_pg_pass"
      # - "TZ=UTC" # Container default
      # - "TZ=America/Sao_Paulo"
    ports:
      - 5432:5432 # host:container
    volumes:
      - ./data:/var/lib/postgresql
      # - ./[init-dir]:/docker-entrypoint-initdb.d/ # use .sh, .sql, run in alphabetical order
